<!doctype html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Simulador de Examen</title><link rel="stylesheet" href="style.css"></head><body><main class="app"><section id="exam" class="card"><header class="top"><div><h1>📋 Evaluación de Desempeño 2026</h1><div class="progressText" id="progressText"></div></div><div class="timer" id="timer">60:00</div><button id="themeBtn" class="ghost" title="Modo oscuro">🌙</button></header><div class="bar"><span id="barFill"></span></div><div class="legend"><span><i class="dot answered"></i>Contestada</span><span><i class="dot empty"></i>Sin contestar</span></div><nav id="grid" class="grid"></nav><article class="question"><div class="pill" id="pill"></div><h2 id="qText"></h2><div id="options" class="options"></div></article><footer class="actions"><button id="prevBtn">← Anterior</button><button id="nextBtn">Siguiente →</button><button id="finishBtn" class="primary">Finalizar examen</button></footer></section><section id="results" class="card results hidden"><h1>Resultados del Examen</h1><h3 id="message">¡Excelente desempeño! 🎉</h3><div class="score" id="score">0/40</div><div class="percent" id="percent">0%</div><div class="stats"><div><b id="ok">0</b><span>Correctas</span></div><div><b id="bad">0</b><span>Incorrectas</span></div><div><b id="blank">0</b><span>Sin contestar</span></div></div><div class="actions center"><button onclick="restartExam()">Reiniciar Examen</button><button onclick="reviewAnswers()">Revisar Respuestas</button></div></section></main><script src="questions.js"></script><script src="script.js"></script></body></html>
