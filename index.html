let state = {started:false, finished:false, current:0, answers: JSON.parse(localStorage.getItem('answers-erp-2026')||'{}'), timeLeft: Number(localStorage.getItem('time-erp-2026')||TOTAL_TIME), dark: localStorage.getItem('theme-erp-2026')==='dark', review:false};
let timerId = null;
function formatTime(seconds){ const m=String(Math.floor(seconds/60)).padStart(2,'0'); const s=String(seconds%60).padStart(2,'0'); return `${m}:${s}`; }
function save(){ localStorage.setItem('answers-erp-2026', JSON.stringify(state.answers)); localStorage.setItem('time-erp-2026', String(state.timeLeft)); localStorage.setItem('theme-erp-2026', state.dark?'dark':'light'); }
function setState(patch){ Object.assign(state, patch); save(); render(); }
function reset(){ localStorage.removeItem('answers-erp-2026'); localStorage.removeItem('time-erp-2026'); state={started:false,finished:false,current:0,answers:{},timeLeft:TOTAL_TIME,dark:state.dark,review:false}; save(); render(); }
function stats(){ let correct=0, incorrect=0, unanswered=0; questions.forEach(q=>{ const a=state.answers[q.id]; if(!a) unanswered++; else if(a===q.correctAnswer) correct++; else incorrect++; }); return {correct, incorrect, unanswered, percent: Math.round((correct/questions.length)*100)}; }
function tick(){ clearInterval(timerId); if(state.started && !state.finished){ timerId=setInterval(()=>{ if(state.timeLeft<=1){ state.timeLeft=0; state.finished=true; state.review=false; save(); render(); clearInterval(timerId); } else { state.timeLeft--; save(); document.querySelector('.timer') && (document.querySelector('.timer').textContent='⏱️ '+formatTime(state.timeLeft)); } },1000); } }
function render(){ document.body.classList.toggle('dark', state.dark); const app=document.getElementById('app');
 if(!state.started){ app.innerHTML=`<main class="shell start-shell"><button class="theme" onclick="setState({dark:!state.dark})">${state.dark?'☀️ Claro':'🌙 Oscuro'}</button><section class="start-card"><h1><span class="book">▌</span> Examen de Evaluación de Desempeño 2026</h1><p class="subtitle"><b>40 preguntas</b> · Rendimiento Profesional Docente MINERD</p><div class="instructions"><b>Instrucciones:</b><ul><li>⏱️ Tiempo total: <b>60 minutos (1 hora)</b></li><li>📝 Total: <b>40 preguntas</b></li><li>⬅️➡️ Puedes avanzar y retroceder entre preguntas</li><li>✅ Al seleccionar una respuesta, verás inmediatamente si es correcta</li><li>💡 Si fallas, se mostrará la explicación de la respuesta correcta</li><li>🔵 Verde = correcta · Rojo = incorrecta · Gris = sin responder</li><li>📊 Al finalizar verás tu puntuación total</li></ul></div><button class="primary start" onclick="setState({started:true})">Comenzar Examen</button></section></main>`; tick(); return; }
 if(state.finished && !state.review){ const s=stats(); app.innerHTML=`<main class="shell"><section class="result-card"><h2>Resultados del Examen</h2><p class="performance">${s.percent>=80?'¡Excelente desempeño! 🎉':'Resultado registrado'}</p><div class="score">${s.correct}/${questions.length}</div><div class="percent">${s.percent}%</div><div class="result-grid"><div><b>${s.correct}</b><span>Correctas</span></div><div><b>${s.incorrect}</b><span>Incorrectas</span></div><div><b>${s.unanswered}</b><span>Sin contestar</span></div></div><div class="actions center"><button class="primary" onclick="setState({review:true})">Revisar Respuestas</button><button onclick="reset()">Reiniciar Examen</button></div></section></main>`; tick(); return; }
 const q=questions[state.current]; const nav=questions.map((item,idx)=>{ const a=state.answers[item.id]; let cls='navbtn'; if(idx===state.current) cls+=' current'; if(state.review||state.finished){ if(!a) cls+=' empty'; else cls+= a===item.correctAnswer?' ok':' bad'; } else if(a) cls+=' answered'; return `<button class="${cls}" onclick="setState({current:${idx}})">${idx+1}</button>`; }).join('');
 const opts=letters.map(l=>{ const selected=state.answers[q.id]===l; const has=!!state.answers[q.id]||state.review||state.finished; let cls='option'; if(has&&l===q.correctAnswer) cls+=' correct'; if(has&&selected&&l!==q.correctAnswer) cls+=' wrong'; if(selected) cls+=' selected'; return `<button class="${cls}" onclick="selectAnswer('${l}')" ${state.review||state.finished?'disabled':''}><span class="radio">${selected?'●':'○'}</span><b>${l}.</b><span>${q.options[l]}</span></button>`; }).join('');
 const a=state.answers[q.id]; const exp=(a||state.review||state.finished)?`<div class="explanation"><b>ℹ️ Explicación</b><p>${a?(a===q.correctAnswer?'Respuesta correcta. ':'Respuesta incorrecta. '):'No respondiste esta pregunta. '}${q.explanation}</p></div>`:'';
 app.innerHTML=`<main class="shell exam-layout"><aside class="side"><div class="timer">⏱️ ${formatTime(state.timeLeft)}</div><div class="nav-grid">${nav}</div><div class="legend"><span>🟢 Correcta</span><span>🔴 Incorrecta</span><span>⚪ Sin responder</span></div><button class="primary full" onclick="setState({finished:true,review:false})">Finalizar evaluación</button><button class="ghost full" onclick="setState({dark:!state.dark})">${state.dark?'Modo claro':'Modo oscuro'}</button></aside><section class="question-card"><span class="pill">Pregunta ${state.current+1} de ${questions.length}</span><h2>${q.question}</h2><img class="pdf-img" src="${q.sourceImage}" alt="Pregunta ${state.current+1} tomada del PDF"><div class="options">${opts}</div>${exp}<div class="actions"><button onclick="setState({current:Math.max(0,state.current-1)})">Anterior</button><button class="primary" onclick="setState({current:Math.min(questions.length-1,state.current+1)})">Siguiente</button></div></section></main>`; tick(); }
function selectAnswer(letter){ if(state.finished) return; const q=questions[state.current]; state.answers[q.id]=letter; setState({answers:state.answers}); }
render();
</script>
</body>
</html>
